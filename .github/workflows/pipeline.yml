name: Nimbus Render Pipeline

on:
  schedule:
    # Run every hour to check NY local time (Minute 0)
    - cron: '0 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check New York Local Time
        id: check-time
        run: |
          # If manually triggered, always run the pipeline
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Manual execution triggered. Skipping time check."
          else
            python check_time.py
          fi

      - name: Run Pipeline
        if: steps.check-time.outputs.should_run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GSHEET_SPREADSHEET_ID: ${{ secrets.GSHEET_SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SKIP_YOUTUBE_UPLOAD: ${{ secrets.SKIP_YOUTUBE_UPLOAD }}
        run: |
          python main.py

      - name: Commit and Push State Logs
        if: steps.check-time.outputs.should_run == 'true' && always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add used_footage_log.json used_news_log.json || echo "Log files not found to add"
          git commit -m "chore(logs): update used footage and news state logs [skip ci]" || echo "No changes to commit"
          git push || echo "Git push failed (possibly no changes or write permission error)"
