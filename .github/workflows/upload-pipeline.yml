name: Nimbus Upload Pipeline (Upload Only)

on:
  schedule:
    # Cek tiap 15 menit -- alasan sama seperti render-pipeline.yml.
    # Target jam tetap dihitung di check_time.py (19:00 ET weekday,
    # 12:00 ET weekend), dedupe by date supaya gak upload dobel.
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI anytime

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check New York Local Upload Time
        id: check-time
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
            echo "Manual execution triggered. Skipping time check."
          else
            python check_time.py --mode upload
          fi

      - name: Download Render Artifacts from Latest Successful Run
        if: steps.check-time.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find latest successful run ID of render-pipeline
          RUN_ID=$(gh run list --workflow="render-pipeline.yml" --status=success --limit=1 --json databaseId -q '.[0].databaseId')
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "Error: No successful runs of render-pipeline.yml found!"
            exit 1
          fi
          echo "Latest successful render run ID: $RUN_ID"
          # Clean up existing files and directories to avoid extraction conflicts
          rm -rf used_news_log.json used_footage_log.json output temp
          # Download and extract the artifacts directly to root directory
          gh run download $RUN_ID --name="nimbus-render-assets" --dir .

      - name: Run Pipeline (Upload Only)
        if: steps.check-time.outputs.should_run == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GDRIVE_REFRESH_TOKEN: ${{ secrets.GDRIVE_REFRESH_TOKEN }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
          GSHEET_SPREADSHEET_ID: ${{ secrets.GSHEET_SPREADSHEET_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SKIP_YOUTUBE_UPLOAD: ${{ secrets.SKIP_YOUTUBE_UPLOAD }}
        run: |
          python main.py --upload-only

      - name: Commit and Push State Logs (Post-upload)
        # always() penting di sini juga, dengan alasan sama: dedupe
        # marker dari check_time.py harus ke-commit walau should_run
        # == 'false' (yaitu di run-run yang cuma cek waktu lalu skip).
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add used_footage_log.json used_news_log.json last_run_state.json || echo "Log files not found to add"
          git commit -m "chore(logs): update state logs after upload check [skip ci]" || echo "No changes to commit"
          git pull --rebase origin master || echo "Rebase failed"
          git push || echo "Git push failed (possibly no changes or write permission error)"
